<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}DevLibrary{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        header {
            background: #1e293b;
            padding: 1.5rem 2rem;
            border-bottom: 2px solid #334155;
        }
        header h1 {
            color: #38bdf8;
            font-size: 1.8rem;
        }
        header h1 a {
            color: inherit;
            text-decoration: none;
        }
        header p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid #1e293b;
            margin-top: 4rem;
        }
        a { color: #38bdf8; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">📚 DevLibrary</a></h1>
        <p>Catalogo de recursos de programacao</p>
    </header>

    <main>
        {% block conteudo %}{% endblock %}
    </main>

    <footer>
        DevLibrary 
    </footer>
</body>
</html>
